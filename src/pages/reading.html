<!-- TAB 5: 오늘의 읽을거리 (Today's Reading) -->
        <!-- ========================================== -->
        
<style>
                /* Dense 100-Mosaic Tile Grid */
                .grid-mosaic {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
                    gap: 8px;
                    padding: 24px;
                    background: #fdfdfd;
                    border-radius: 20px;
                    border: 1px solid #f0f0f0;
                }
                
                .mosaic-block {
                    cursor: pointer;
                    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
                    position: relative;
                    aspect-ratio: 1 / 1;
                    border-radius: 6px;
                    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                
                .mosaic-block:hover {
                    transform: scale(1.15);
                    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
                    z-index: 10;
                }
                
                .mosaic-block.read {
                    background-color: #e5e5e5 !important;
                    box-shadow: none !important;
                    transform: scale(0.95);
                }
                
                .mosaic-check {
                    font-size: 16px;
                    color: #fff;
                    opacity: 0;
                    font-weight: bold;
                    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
                }
                
                .mosaic-block.read .mosaic-check {
                    opacity: 1;
                    color: #888;
                    text-shadow: none;
                }
                
                .mosaic-block.active {
                    box-shadow: 0 0 0 3px #0066cc;
                    transform: scale(1.1);
                    z-index: 5;
                }
                
                @keyframes bombExplode {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.5) rotate(15deg); }
                    100% { transform: scale(1.2); }
                }
                @keyframes bounce {
                    0%, 100% { transform: translateY(0); }
                    50% { transform: translateY(-20px); }
                }
            </style>

            <div class="grid-mosaic" id="mosaic-grid">
                <!-- JavaScript will populate 100 mosaic blocks here -->
            </div>

            <div class="hero" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); padding: 32px; border-radius: 20px; text-align: center; margin-bottom: 24px; border: 1px solid rgba(0,0,0,0.05);">
                <h1 style="font-size: 28px; margin-bottom: 12px; color: #1d1d1f; letter-spacing: -0.5px;">오늘의 읽을거리 100선 🎯</h1>
                <p style="font-size: 16px; color: #555; line-height: 1.5; max-width: 600px; margin: 0 auto; word-break: keep-all;">
                    아래의 100개 모자이크 블록을 눌러 숨겨진 지식을 해제해 보세요!<br>
                    블록을 누르면 요약 내용이 나타나며 도감에 체크표시가 새겨집니다.
                </p>
            </div>

            <!-- Detail Pane (Replacing Modal) -->
            <div id="article-detail-pane" style="background: #fff; border-radius: 16px; padding: 32px; margin-bottom: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #eaeaea; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; text-align: center;">
                <div id="detail-placeholder" style="color: #999; font-size: 16px;">
                    <span style="font-size: 32px; display: block; margin-bottom: 12px;">👆</span>
                    아래 도감에서 컬러 블록을 하나 선택해 보세요.
                </div>
                
                <div id="detail-content" style="display: none; width: 100%; text-align: left;">
                    <div id="detail-category" style="color: #0066cc; font-size: 13px; font-weight: 600; margin-bottom: 10px;"></div>
                    <h2 id="detail-title" style="font-size: 22px; margin-bottom: 16px; line-height: 1.35; color: #1d1d1f; word-break: keep-all;"></h2>
                    <p id="detail-excerpt" style="font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 20px; background: #f9f9f9; padding: 16px; border-radius: 12px;"></p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div id="detail-meta" style="font-size: 12px; color: #888;"></div>
                        <button id="detail-link-btn" style="padding: 10px 20px; border-radius: 99px; border: none; background: #0066cc; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;">↗ 원문 보기</button>
                    </div>
                </div>
            </div>

            <script src="articles.js"></script>
            <script>
                let currentArticleUrl = '';
                // 이스터에그: 100개 중 1개 폭탄 위치 무작위 배정
                window.bombIndex = Math.floor(Math.random() * 100);
                
                function renderMosaic() {
                    const grid = document.getElementById('mosaic-grid');
                    if (!grid || typeof articlesData === 'undefined') return;
                    
                    grid.innerHTML = '';
                    
                    let readList = [];
                    try {
                        const saved = localStorage.getItem('jhub_read_articles');
                        if (saved) readList = JSON.parse(saved);
                    } catch (e) {}
                    
                    articlesData.forEach((article, index) => {
                        let bgColor = '#ffffff';
                        const cat = article.category || '';
                        
                        // Vibrant colors for the mosaic
                        if (cat.includes('예술') || cat.includes('문화') || cat.includes('디자인')) {
                            bgColor = '#FFD166'; // Yellow
                        } else if (cat.includes('건축') || cat.includes('공학') || cat.includes('시티')) {
                            bgColor = '#118AB2'; // Blue
                        } else if (cat.includes('경제') || cat.includes('부동산') || cat.includes('상업')) {
                            bgColor = '#06D6A0'; // Green
                        } else {
                            bgColor = '#EF476F'; // Pink/Red
                        }
                        
                        const isRead = readList.includes(index);
                        const cardClass = isRead ? "mosaic-block read" : "mosaic-block";
                        
                        let clickAction = `openDetail(${index})`;
                        if (index === window.bombIndex) {
                            clickAction = `triggerEasterEgg(${index})`;
                        }
                        
                        const cardHtml = `
                            <div class="${cardClass}" id="mosaic-card-${index}" style="background-color: ${bgColor};" onclick="${clickAction}" title="${article.category}: ${article.title}">
                                <div class="mosaic-check">✓</div>
                            </div>
                        `;
                        grid.innerHTML += cardHtml;
                    });
                }
                
                function triggerEasterEgg(index) {
                    const card = document.getElementById('mosaic-card-' + index);
                    if (card) {
                        card.style.background = 'url("data:image/svg+xml;utf8,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' viewBox=\\\'0 0 24 24\\\' fill=\\\'none\\\' stroke=\\\'red\\\' stroke-width=\\\'2\\\' stroke-linecap=\\\'round\\\' stroke-linejoin=\\\'round\\\'><path d=\\\'M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z\\\' fill=\\\'red\\\'></path></svg>") center/50% no-repeat, #fff';
                        card.style.animation = 'bombExplode 0.5s ease-out forwards';
                    }
                    
                    const pane = document.getElementById('article-detail-pane');
                    pane.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 80px; animation: bounce 1s infinite;">💣🎉❤️</div>
                            <h2 style="font-size: 32px; color: #e30000; margin-top: 20px;">당신의 오늘을 축하합니다!</h2>
                            <p style="font-size: 18px; color: #555; margin-top: 10px;">수많은 타일 중 특별한 행운을 발견하셨습니다.</p>
                        </div>
                    `;
                    pane.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                function openDetail(index) {
                    const article = articlesData[index];
                    if (!article) return;
                    
                    // Remove active state from all blocks
                    document.querySelectorAll('.mosaic-block').forEach(b => b.classList.remove('active'));
                    
                    // Save read state & set active
                    const card = document.getElementById('mosaic-card-' + index);
                    if (card) {
                        card.classList.add('active');
                        card.classList.add('read');
                    }
                    
                    let readList = [];
                    try {
                        const saved = localStorage.getItem('jhub_read_articles');
                        if (saved) readList = JSON.parse(saved);
                    } catch (e) {}
                    
                    if (!readList.includes(index)) {
                        readList.push(index);
                        localStorage.setItem('jhub_read_articles', JSON.stringify(readList));
                    }
                    
                    // Populate Detail Pane
                    document.getElementById('detail-placeholder').style.display = 'none';
                    document.getElementById('detail-content').style.display = 'block';
                    
                    document.getElementById('detail-category').innerText = article.category;
                    document.getElementById('detail-title').innerText = article.title;
                    document.getElementById('detail-excerpt').innerHTML = article.excerpt;
                    document.getElementById('detail-meta').innerText = article.meta;
                    
                    currentArticleUrl = 'https://www.google.com/search?q=' + encodeURIComponent(article.title);
                    
                    // Smooth scroll up to the detail pane if needed
                    document.getElementById('article-detail-pane').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                document.getElementById('detail-link-btn').addEventListener('click', () => {
                    if (currentArticleUrl) {
                        window.open(currentArticleUrl, '_blank');
                    }
                });
                
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(renderMosaic, 100);
                });
                
                const readingTabItem = document.querySelector('[data-target="tab-reading"]');
                if (readingTabItem) {
                    readingTabItem.addEventListener('click', renderMosaic);
                }
            </script>
