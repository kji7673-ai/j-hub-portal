<style>
/* 
=====================================================
Swiss Grid & Architecture Minimalism (J-Hub v2.0)
=====================================================
*/
:root {
    --bg-color: #f5f5f7;
    --surface: #ffffff;
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --accent: #000000;
    --border: #e5e5ea;
    --radius: 0px; /* Brutalism: No rounded corners */
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: -0.3px;
    margin: 0;
    padding: 0;
}

header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mode-switch {
    display: flex;
    gap: 10px;
}

.mode-btn {
    padding: 12px 24px;
    font-size: 16px;
    font-weight: 600;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
}

.mode-btn.active {
    background: var(--accent);
    color: #fff;
}

/* Swiss Typography */
h1, h2, h3 {
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 16px;
}

/* App Container */
#app-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* Hide all pages by default */
.page-view {
    display: none;
    animation: fadeIn 0.4s ease-out forwards;
}
.page-view.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Journal Mosaic overrides for Swiss aesthetic */
.grid-mosaic {
    gap: 4px !important;
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
}
.mosaic-block {
    border-radius: 0 !important;
    box-shadow: none !important;
    filter: grayscale(100%);
    transition: filter 0.3s, transform 0.3s !important;
}
.mosaic-block:hover {
    filter: grayscale(0%);
    transform: scale(1.02) !important;
    z-index: 10;
    border: 1px solid #000;
}
.mosaic-block.active {
    filter: grayscale(0%);
    border: 2px solid #000 !important;
    box-shadow: none !important;
}

/* Workspace Grid */
.workspace-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}
.workspace-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
}

/* Login Screen */
#login-screen {
    position: fixed; inset: 0; background: var(--bg-color);
    display: flex; justify-content: center; align-items: center; z-index: 9999;
}
.login-card {
    background: var(--surface); border: 2px solid var(--accent);
    padding: 40px; width: 340px; text-align: left;
}
.login-card input {
    width: 100%; padding: 12px; margin-bottom: 16px;
    border: 1px solid var(--border); font-size: 16px; box-sizing: border-box;
}
.login-card button {
    width: 100%; padding: 16px; background: var(--accent);
    color: #fff; font-weight: bold; border: none; font-size: 16px; cursor: pointer;
}
</style>

</head>

            <script>
                let currentArticleUrl = '';
                
                function renderMosaic() {
                    const grid = document.getElementById('mosaic-grid');
                    if (!grid || typeof articlesData === 'undefined') return;
                    
                    grid.innerHTML = '';
                    
                    let readList = [];
                    try {
                        const saved = localStorage.getItem('jhub_read_articles');
                        if (saved) readList = JSON.parse(saved);
                    } catch (e) {}
                    
                    articlesData.forEach((article, index) => {
                        let bgColor = '#ffffff';
                        const cat = article.category || '';
                        
                        // Vibrant colors for the mosaic
                        if (cat.includes('예술') || cat.includes('문화') || cat.includes('디자인')) {
                            bgColor = '#FFD166'; // Yellow
                        } else if (cat.includes('건축') || cat.includes('공학') || cat.includes('시티')) {
                            bgColor = '#118AB2'; // Blue
                        } else if (cat.includes('경제') || cat.includes('부동산') || cat.includes('상업')) {
                            bgColor = '#06D6A0'; // Green
                        } else {
                            bgColor = '#EF476F'; // Pink/Red
                        }
                        
                        const isRead = readList.includes(index);
                        const cardClass = isRead ? "mosaic-block read" : "mosaic-block";
                        
                        const cardHtml = `
                            <div class="${cardClass}" id="mosaic-card-${index}" style="background-color: ${bgColor};" onclick="openDetail(${index})" title="${article.category}: ${article.title}">
                                <div class="mosaic-check">✓</div>
                            </div>
                        `;
                        grid.innerHTML += cardHtml;
                    });
                }
                
                function openDetail(index) {
                    const article = articlesData[index];
                    if (!article) return;
                    
                    // Remove active state from all blocks
                    document.querySelectorAll('.mosaic-block').forEach(b => b.classList.remove('active'));
                    
                    // Save read state & set active
                    const card = document.getElementById('mosaic-card-' + index);
                    if (card) {
                        card.classList.add('active');
                        card.classList.add('read');
                    }
                    
                    let readList = [];
                    try {
                        const saved = localStorage.getItem('jhub_read_articles');
                        if (saved) readList = JSON.parse(saved);
                    } catch (e) {}
                    
                    if (!readList.includes(index)) {
                        readList.push(index);
                        localStorage.setItem('jhub_read_articles', JSON.stringify(readList));
                    }
                    
                    // Populate Detail Pane
                    document.getElementById('detail-placeholder').style.display = 'none';
                    document.getElementById('detail-content').style.display = 'block';
                    
                    document.getElementById('detail-category').innerText = article.category;
                    document.getElementById('detail-title').innerText = article.title;
                    document.getElementById('detail-excerpt').innerHTML = article.excerpt;
                    document.getElementById('detail-meta').innerText = article.meta;
                    
                    currentArticleUrl = 'https://www.google.com/search?q=' + encodeURIComponent(article.title);
                    
                    // Smooth scroll up to the detail pane if needed
                    document.getElementById('article-detail-pane').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                document.getElementById('detail-link-btn').addEventListener('click', () => {
                    if (currentArticleUrl) {
                        window.open(currentArticleUrl, '_blank');
                    }
                });
                
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(renderMosaic, 100);
                });
                
                const readingTabItem = document.querySelector('[data-target="tab-reading"]');
                if (readingTabItem) {
                    readingTabItem.addEventListener('click', renderMosaic);
                }
            </script>

<script>
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
</script>

    async function attemptLogin() {
        const name = document.getElementById("login-name").value.trim();
        const pass = document.getElementById("login-pass").value.trim();
        const err = document.getElementById("login-error");
        
        if(allowedUsersHash[name]) {
            const hashedPass = await sha256(pass);
            if (hashedPass === allowedUsersHash[name]) {
                localStorage.setItem("jhub_logged_in", "true");
                localStorage.setItem("jhub_user_name", name);
                document.getElementById("user-profile-name").textContent = name + " 님";
                document.getElementById("login-screen").style.display = "none";
                return;
            }
        }
        err.style.display = "block";
    }

    function checkLogin() {
        if (localStorage.getItem("jhub_logged_in") === "true") {
            const userName = localStorage.getItem("jhub_user_name");
            document.getElementById("user-profile-name").textContent = userName + " 님";
            document.getElementById("login-screen").style.display = "none";
        }
    }

    // Mode Switch Logic
    function switchMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
        
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('view-' + mode).classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
        checkLogin();
        // Bind enter key
        document.getElementById("login-pass").addEventListener("keypress", e => {
            if(e.key === "Enter") attemptLogin();
        });
    });
