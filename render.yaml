services:
  - type: web
    name: j-hub-portal
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_SECRET_KEY
        generateValue: true
  # ADD-01 FIX: Render Cron Job으로 매일 자동 동기화 (KST 08:00 = UTC 23:00)
  - type: cron
    name: j-hub-daily-sync
    env: python
    schedule: "0 23 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash scripts/run_daily_sync.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
